body {

.bg {
  animation:slide 12s ease-in-out infinite alternate;
  background-image: linear-gradient(-65deg, #2e2d2a 50%, #434343 50%);
  bottom:0;
  left:-50%;
  opacity:.5;
  position:fixed;
  right:-50%;
  top:0;
  z-index:-1;
}

.bg2 {
  animation-direction:alternate-reverse;
  animation-duration:16s;
}

.bg3 {
  animation-duration:25s;

}

h1 {
  font-family:monospace;
}

@keyframes slide {
  0% {
    transform:translateX(-25%);
  }
  100% {
    transform:translateX(25%);
  }
}




a {
  color: #ffcc00;          /* normal */
  text-decoration: none;   /* remove underline if you want */
  font-family: sans-serif;
}

a:hover {
  color: #ffffff;          /* when hovering */
}

a:visited {
  color: #cc9900;          /* after clicking */
}

a:active {

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <title>Steven Vitéz</title>
  <link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #2a2a2a url('bg.jpg') center center / cover no-repeat fixed;
    }

    /* ── Name above bar ── */
    .site-title {
      font-family: 'Stardos Stencil', serif;
      font-size: 28px;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    /* ── Outer wrapper gives the bleeding photo room ── */
    .bar-outer {
      position: relative;
      width: min(860px, 92vw);
      padding-top: 70px;
      padding-bottom: 70px;
    }

    /* ── Horizontal bar ── */
    .bar {
      position: relative;
      width: 100%;
      padding: 36px 40px;
      background: rgba(20, 20, 20, 0.45);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: visible;           /* allows photo to bleed out */
      display: flex;
      align-items: center;
      gap: 32px;
    }

    /* ── Animated diagonal layers, clipped separately ── */
    .bar-bg {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .bg-layer {
      animation: slide 12s ease-in-out infinite alternate;
      background-image: linear-gradient(-65deg, rgba(46,45,42,0.6) 50%, rgba(67,67,67,0.6) 50%);
      position: absolute;
      inset: 0;
      left: -50%;
      right: -50%;
    }

    .bg-layer2 {
      animation-direction: alternate-reverse;
      animation-duration: 16s;
    }

    .bg-layer3 {
      animation-duration: 25s;
    }

    @keyframes slide {
      0%   { transform: translateX(-25%); }
      100% { transform: translateX(25%); }
    }

    /* ── Content sits above animated layers ── */
    .bar-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 32px;
      width: 100%;
    }

    /* ── Profile image wrapper — bleeds above and below the bar ── */
    .profile-img-wrap {
      flex-shrink: 0;
      margin-top: -90px;
      margin-bottom: -90px;
    }

    .profile-img {
      display: block;
      width: clamp(140px, 18vw, 250px);
      height: clamp(280px, 36vw, 400px);
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Spacer pushes tiles right of center ── */
    .spacer {
      flex: 1;
    }

    /* ── Tile grid ── */
    .tiles {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .tile {
      width: clamp(100px, 14vw, 140px);
      height: clamp(100px, 14vw, 140px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: white;
      font-family: 'Stardos Stencil', serif;
      font-size: 12px;
      text-align: center;
      padding: 10px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      line-height: 1.3;
    }

    .tile:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .tile-icon {
      font-size: 28px;
      line-height: 1;
    }

    .tile-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      font-family: Arial, sans-serif;
      line-height: 1.3;
      margin: 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-family: Arial, sans-serif;
    }

    footer a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 5px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive: stack on small screens ── */
    @media (max-width: 520px) {
      .bar-outer {
        padding-top: 0;
        padding-bottom: 0;
      }
      .profile-img-wrap {
        margin-top: 0;
        margin-bottom: 0;
      }
      .profile-img {
        width: 100%;
        height: 200px;
      }
      .bar-content {
        flex-direction: column;
      }
      .tiles {
        width: 100%;
        justify-content: center;
      }
      .spacer { display: none; }
    }
  </style>
</head>

<body>

  <p class="site-title">- Steven Vitéz -</p>

  <div class="bar-outer">
    <div class="bar">
      <!-- Animated diagonal layers, clipped to bar -->
      <div class="bar-bg">
        <div class="bg-layer"></div>
        <div class="bg-layer bg-layer2"></div>
        <div class="bg-layer bg-layer3"></div>
      </div>

      <div class="bar-content">
        <div class="profile-img-wrap">
          <img class="profile-img" src="image.jpg" alt="Steven Vitéz">
        </div>

        <div class="spacer"></div>

        <div class="tiles">
          <a class="tile" href="game.html">
            <span class="tile-icon">🕹️</span>
            Lander Deluxe
            <span class="tile-sub">Play my early-2000s game</span>
          </a>
          <a class="tile" href="https://wochenplan.vit3z.com">
            <span class="tile-icon">📅</span>
            Wochenplan Scheduler
            <span class="tile-sub">Plan your week</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Steven Vitéz · <a href="impressum.html">Impressum</a>
  </footer>

</body>
</html>
